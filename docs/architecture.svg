<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Volta Memory production architecture</title>
  <desc id="desc">A static OSS and CDN frontend calls API Gateway, which routes to Function Compute and Qwen Cloud and persists memory in RDS PostgreSQL with pgvector. SLS receives logs and Secrets Manager supplies runtime secrets through a least-privilege RAM role.</desc>
  <defs>
    <style>
      .bg { fill: #07111f; } .surface { fill: #10233a; stroke: #284865; stroke-width: 2; }
      .edge { fill: none; stroke: #6e8da8; stroke-width: 3; marker-end: url(#arrow); }
      .title { fill: #f6f8fb; font: 700 34px Inter, Arial, sans-serif; }
      .subtitle { fill: #a5bdd2; font: 400 18px Inter, Arial, sans-serif; }
      .heading { fill: #f6f8fb; font: 700 19px Inter, Arial, sans-serif; text-anchor: middle; }
      .detail { fill: #b8c9d9; font: 400 14px Inter, Arial, sans-serif; text-anchor: middle; }
      .tag { fill: #fbbf24; font: 700 12px Inter, Arial, sans-serif; text-anchor: middle; letter-spacing: 1.2px; }
      .green { stroke: #4ade80; } .cyan { stroke: #22d3ee; } .gold { stroke: #fbbf24; } .violet { stroke: #a78bfa; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 1 L 10 5 L 0 9 z" fill="#6e8da8"/></marker>
  </defs>
  <rect class="bg" width="1400" height="820" rx="28"/>
  <text class="title" x="60" y="68">Volta Memory</text>
  <text class="subtitle" x="60" y="100">Source-linked, versioned memory for auditable home-energy advice</text>

  <path class="edge" d="M 300 250 H 405"/>
  <path class="edge" d="M 625 250 H 730"/>
  <path class="edge" d="M 900 325 V 510"/>
  <path class="edge" d="M 1070 250 H 1165"/>
  <path class="edge" d="M 900 325 C 930 410, 1010 445, 1115 500"/>
  <path class="edge" d="M 720 640 H 815"/>

  <g transform="translate(60 185)">
    <rect class="surface cyan" width="240" height="130" rx="18"/>
    <text class="tag" x="120" y="30">PUBLIC EXPERIENCE</text>
    <text class="heading" x="120" y="67">OSS + CDN</text>
    <text class="detail" x="120" y="95">Static Next.js export</text>
    <text class="detail" x="120" y="116">runtime-config.js</text>
  </g>
  <g transform="translate(405 185)">
    <rect class="surface gold" width="220" height="130" rx="18"/>
    <text class="tag" x="110" y="30">PUBLIC API EDGE</text>
    <text class="heading" x="110" y="67">API Gateway</text>
    <text class="detail" x="110" y="95">Exact CORS</text>
    <text class="detail" x="110" y="116">Rate + concurrency limits</text>
  </g>
  <g transform="translate(730 165)">
    <rect class="surface green" width="340" height="160" rx="18"/>
    <text class="tag" x="170" y="30">RUNTIME</text>
    <text class="heading" x="170" y="68">Function Compute 3.0 + FastAPI</text>
    <text class="detail" x="170" y="99">session lifecycle · retrieval · explain trace</text>
    <text class="detail" x="170" y="123">source verification · corrections · memory writes</text>
  </g>
  <g transform="translate(1165 185)">
    <rect class="surface gold" width="180" height="130" rx="18"/>
    <text class="tag" x="90" y="30">INFERENCE</text>
    <text class="heading" x="90" y="67">Qwen Cloud</text>
    <text class="detail" x="90" y="95">chat · extraction</text>
    <text class="detail" x="90" y="116">classification · embeddings</text>
  </g>
  <g transform="translate(680 510)">
    <rect class="surface cyan" width="440" height="150" rx="18"/>
    <text class="tag" x="220" y="30">PERSISTENT MEMORY</text>
    <text class="heading" x="220" y="67">ApsaraDB RDS PostgreSQL + pgvector</text>
    <text class="detail" x="220" y="97">sessions · messages · memories · provenance</text>
    <text class="detail" x="220" y="120">relations · lifecycle events · explain traces</text>
  </g>
  <g transform="translate(160 570)">
    <rect class="surface violet" width="360" height="100" rx="18"/>
    <text class="tag" x="180" y="29">SECRETS + IDENTITY</text>
    <text class="heading" x="180" y="62">Secrets Manager + RAM role</text>
    <text class="detail" x="180" y="84">least-privilege runtime access</text>
  </g>
  <g transform="translate(815 690)">
    <rect class="surface violet" width="260" height="82" rx="18"/>
    <text class="tag" x="130" y="29">OBSERVABILITY</text>
    <text class="heading" x="130" y="60">SLS logs + metrics</text>
  </g>

  <text class="subtitle" x="60" y="756">Direct Function Compute public access is disabled after API Gateway cutover. Static assets never contain Qwen or database credentials.</text>
</svg>
