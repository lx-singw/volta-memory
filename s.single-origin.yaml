# Zero-domain hackathon release. This deliberately has no custom runtime role:
# the app calls Qwen/RDS over its configured network endpoints and FC's
# service-linked role handles platform logging. Keep s.yaml for the hardened
# custom-domain OSS/CDN/API Gateway topology.
edition: 3.0.0
name: volta-memory-single-origin-demo
vars:
  region: "ap-southeast-1"

resources:
  volta_memory_backend:
    component: fc3
    props:
      region: ${vars.region}
      functionName: "volta-memory-backend"
      description: "Volta Memory same-origin hackathon demo"
      runtime: "custom.debian10"
      timeout: 60
      memorySize: 512
      cpu: 0.5
      diskSize: 512
      code: "./backend"
      customRuntimeConfig:
        command:
          - "/var/fc/lang/python3.10/bin/python3"
        args:
          - "-m"
          - "uvicorn"
          - "app.main:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "9000"
      environmentVariables:
        APP_ENV: "production"
        PYTHONPATH: "/code/python"
        PATH: "/var/fc/lang/python3.10/bin:/code/python/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/code:/code/bin:/opt:/opt/bin"
        DATABASE_URL: ${env(DATABASE_URL)}
        DATABASE_SSL_MODE: "require"
        QWEN_API_KEY: ${env(QWEN_API_KEY)}
        QWEN_API_BASE_URL: ${env(QWEN_API_BASE_URL)}
        AUTH_SESSION_SECRET: ${env(AUTH_SESSION_SECRET)}
        ADMIN_API_KEY: ${env(ADMIN_API_KEY)}
        AUTH_SESSION_COOKIE_NAME: ${env(AUTH_SESSION_COOKIE_NAME)}
        AUTH_CSRF_COOKIE_NAME: ${env(AUTH_CSRF_COOKIE_NAME)}
        CORS_ALLOWED_ORIGINS: ${env(CORS_ALLOWED_ORIGINS)}
        SERVE_BUNDLED_STATIC: "true"
      triggers:
        - triggerName: http-trigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            disableURLInternet: false
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
