id: persona_01_backup_priority
entity_id: eval-entity-01
theme: Prioritises backup duration over bill savings
sessions:
- session_number: 1
  messages:
  - role: user
    content: Hi, I'm looking for a solar system. Load-shedding is getting unbearable
      in my area.
  - role: assistant
    content: I completely understand. To advise you, what is your average monthly
      electricity bill, and is your main priority saving money or having backup power
      during outages?
  - role: user
    content: My average bill is R3,200. Sashing the bill would be great, but honestly
      my primary goal is backup power to keep the lights and internet running during
      outages.
  - role: assistant
    content: Got it. Having backup power is the main priority for your R3,200 bill.
- session_number: 2
  messages:
  - role: user
    content: What size battery do you recommend for me?
ground_truth:
  should_recall:
  - backup
  - R3,200
  should_not_recall: []
  should_correct: []
  downstream_quality:
    must_reference:
    - backup
    - R3,200
    must_not_reference: []
  assertions:
  - type: memory_stored
    id: backup_priority
    value: backup
  - type: memory_stored
    id: monthly_bill
    value: '3200'
  - type: response_uses
    id: monthly_bill
    value: '3200'
