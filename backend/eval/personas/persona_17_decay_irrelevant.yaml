    content: Hi, I want solar. My monthly bill is R3,400. I also have a pet parrot
      named Charlie who likes to sing.
  - role: assistant
    content: Got it. Sizing for R3,400. Say hi to Charlie!
- session_number: 2
  messages:
  - role: user
    content: What system size do you recommend for my house?
ground_truth:
  should_recall:
  - R3,400
  should_not_recall:
  - parrot
  - Charlie
  should_forget:
  - parrot
  - Charlie
  downstream_quality:
    must_reference:
    - R3,400
    must_not_reference:
    - parrot
    - Charlie
  assertions:
  - type: memory_stored
    id: monthly_bill
    value: '3400'
  - type: memory_stored
    id: pet_parrot
    value: parrot
  - type: excluded_at_query
    id: pet_parrot
  - type: response_uses
    id: monthly_bill
    value: '3400'
