id: persona_02_cost_priority
entity_id: eval-entity-02
theme: Prioritises cost savings over backup
sessions:
- session_number: 1
  messages:
  - role: user
    content: Hi, I'm looking to install solar panels. Electricity prices are sky-high.
  - role: assistant
    content: I understand. What is your average monthly electricity bill, and do you
      care more about backup power or bill savings?
  - role: user
    content: My bill is R3,500. I want to maximize my financial savings. I don't really
      care about backup batteries, just want to cut the bill.
  - role: assistant
    content: Understood. Bill savings are your primary motivation.
- session_number: 2
  messages:
  - role: user
    content: How much would I save with a standard system?
ground_truth:
  should_recall:
  - savings
  - R3,500
  should_not_recall:
  - battery
  - backup
  should_correct: []
  downstream_quality:
    must_reference:
    - savings
    - R3,500
    must_not_reference:
    - battery
    - backup
  assertions:
  - type: memory_stored
    id: cost_priority
    value: savings
  - type: memory_stored
    id: monthly_bill
    value: '3500'
  - type: response_uses
    id: monthly_bill
    value: '3500'
