id: persona_15_correction_bill
entity_id: eval-entity-15
theme: Corrects bill R3,200 to R3,800
sessions:
- session_number: 1
  messages:
  - role: user
    content: Hi, I'm looking into solar. My monthly electricity bill is R3,200.
  - role: assistant
    content: Welcome! With a monthly bill of R3,200, we can design a standard system.
- session_number: 2
  messages:
  - role: user
    content: Actually, I checked my statement, and my bill is more like R3,800 on
      average now.
  - role: assistant
    content: Okay, I will update your bill amount to R3,800 in my recommendations.
- session_number: 3
  messages:
  - role: user
    content: What system recommendations do you have for me now?
ground_truth:
  should_recall:
  - R3,800
  should_not_recall:
  - R3,200
  should_correct:
  - old: R3,200
    new: R3,800
  downstream_quality:
    must_reference:
    - R3,800
    must_not_reference:
    - R3,200
  assertions:
  - type: memory_stored
    id: monthly_bill_old
    value: '3200'
  - type: superseded
    old: monthly_bill_old
    new: monthly_bill_current
    value: '3800'
  - type: response_uses
    id: monthly_bill_current
    value: '3800'
